name: AI Issue Analyst

on:
  issues:
    types: [opened]

permissions:
  models: read
  issues: write
  contents: read

jobs:
  analyze:
    name: Analyze Issue + Inspect Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect code context
        id: code-context
        shell: bash
        run: |
          # 파일 트리 수집
          FILE_TREE=$(find . \
            -not -path '*/.git/*' \
            -not -path '*/node_modules/*' \
            -not -path '*/__pycache__/*' \
            -not -path '*/.venv/*' \
            -not -name '*.lock' \
            -not -name '*.sum' \
            | sort | head -200)

          # 키워드 추출
          ISSUE_TEXT='${{ github.event.issue.title }} ${{ github.event.issue.body }}'
          KEYWORDS=$(echo "$ISSUE_TEXT" \
            | tr '[:upper:]' '[:lower:]' \
            | grep -oE '[a-z0-9_]{4,}' \
            | sort -u | head -20 \
            | tr '\n' '|' | sed 's/|$//')

          # 관련 파일 수집
          RELEVANT_FILES=""
          if [ -n "$KEYWORDS" ]; then
            MATCHED=$(grep -rl \
              --include="*.py" --include="*.ts" --include="*.tsx" \
              --include="*.js" --include="*.jsx" --include="*.go" \
              --include="*.java" --include="*.rb" --include="*.php" \
              --include="*.cs" --include="*.cpp" --include="*.c" \
              --include="*.swift" --include="*.kt" \
              -E "$KEYWORDS" . 2>/dev/null \
              | grep -v node_modules \
              | grep -v __pycache__ \
              | head -5 || true)

            while IFS= read -r FILE; do
              [ -z "$FILE" ] && continue
              LINE_COUNT=$(wc -l < "$FILE")
              if [ "$LINE_COUNT" -le 300 ]; then
                CONTENT=$(cat "$FILE")
              else
                CONTENT=$(head -100 "$FILE")
                CONTENT="${CONTENT}"$'\n'"... (truncated, ${LINE_COUNT} lines total)"
              fi
              RELEVANT_FILES="${RELEVANT_FILES}"$'\n'"=== FILE: ${FILE} ==="$'\n'"${CONTENT}"$'\n'
            done <<< "$MATCHED"
          fi

          # GitHub Output에 저장
          {
            echo "file_tree<<EOF_TREE"
            echo "$FILE_TREE"
            echo "EOF_TREE"
          } >> "$GITHUB_OUTPUT"

          {
            echo "relevant_files<<EOF_FILES"
            printf '%s' "$RELEVANT_FILES"
            echo ""
            echo "EOF_FILES"
          } >> "$GITHUB_OUTPUT"

      - name: Analyze issue with AI
        id: ai-response
        uses: actions/ai-inference@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max-tokens: 2000
          system-prompt: |
            You are a senior software engineer acting as an automated code reviewer for GitHub issues.
            You have access to the repository's actual source code.

            Your job is to produce a structured analysis comment — always in Korean — with the following sections:

            ## 🔍 이슈 요약
            - 이슈를 2~3문장으로 명확하게 정리한다.
            - 버그인지, 기능 요청인지, 질문인지 분류한다.

            ## ❓ 부족한 정보 / 추가로 필요한 사항
            - 재현 방법, 에러 메시지, 환경 정보 등 누락된 내용을 구체적으로 나열한다.
            - 이슈가 완전하다면 "없음"으로 표시한다.

            ## 🛠 코드 수정 가능 여부 분석
            제공된 파일 트리와 관련 코드를 바탕으로 아래 중 하나로 판단한다:

            **✅ 코드 수정으로 해결 가능**
            - 관련 파일 경로와 수정이 필요한 부분을 명시한다.
            - 가능하면 의사코드(pseudocode) 수준의 수정 방향을 제시한다.

            **⚠️ 부분적으로 가능 (추가 정보 필요)**
            - 현재 코드에서 확인된 것과 불확실한 것을 분리하여 설명한다.

            **❌ 코드 수정만으로 해결 불가**
            - 이유를 명시한다 (인프라 문제, 외부 의존성, 설계 변경 필요 등).

            ## 📋 권장 다음 단계
            - 담당자 또는 이슈 작성자가 취해야 할 구체적인 액션을 번호 리스트로 제시한다.

            규칙:
            - 마크다운 코드블록을 사용해도 됩니다.
            - 응답 끝에 항상 "— AI Analyst 🤖" 서명을 붙인다.
            - 코드가 없거나 관련 파일을 찾지 못한 경우, "코드를 확인할 수 없어 구조적 분석만 제공합니다"라고 명시한다.

          prompt: |
            ## 이슈 정보

            작성자: ${{ github.event.issue.user.login }}
            제목: ${{ github.event.issue.title }}

            본문:
            ${{ github.event.issue.body }}

            ---

            ## 레포지토리 파일 구조

            ${{ steps.code-context.outputs.file_tree }}

            ---

            ## 이슈와 관련된 소스 코드

            ${{ steps.code-context.outputs.relevant_files }}

            ---

            위 정보를 바탕으로 이슈를 분석하고, system prompt에 정의된 형식으로 응답하세요.

      - name: Post analysis comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number }}
          body: ${{ steps.ai-response.outputs.response }}
